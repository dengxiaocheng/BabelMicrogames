name: docs-sync-guard

on:
  pull_request:
    paths:
      - ".github/workflows/docs-sync-guard.yml"
      - ".githooks/**"
      - "AGENTS.md"
      - "README.md"
      - "cmd/**"
      - "docs/**"
      - "internal/**"
      - "requirements/**"
      - "scripts/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docs-sync-guard.yml"
      - ".githooks/**"
      - "AGENTS.md"
      - "README.md"
      - "cmd/**"
      - "docs/**"
      - "internal/**"
      - "requirements/**"
      - "scripts/**"

concurrency:
  group: docs-sync-guard-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  docs-sync-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Determine compare range
        id: compare
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "mode=merge-base" >> "$GITHUB_OUTPUT"
            echo "merge_base_with=origin/${GITHUB_BASE_REF}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          before="${{ github.event.before }}"
          if [[ -z "$before" || "$before" == "0000000000000000000000000000000000000000" ]]; then
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              before="$(git rev-parse HEAD^)"
            else
              before="$(git rev-parse HEAD)"
            fi
          fi
          echo "mode=range" >> "$GITHUB_OUTPUT"
          echo "base=$before" >> "$GITHUB_OUTPUT"
          echo "head=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Run guard suite with artifacts
        id: guard_suite
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p .ci-artifacts
          : > .ci-artifacts/guard-status.jsonl

          failures=0

          run_step() {
            local name="$1"
            shift
            echo "### ${name}" | tee -a "$GITHUB_STEP_SUMMARY"
            "$@" 2>&1 | tee ".ci-artifacts/${name}.log"
            local status=${PIPESTATUS[0]}
            if [[ $status -eq 0 ]]; then
              echo "- status: ok" | tee -a "$GITHUB_STEP_SUMMARY"
              echo "{\"name\":\"${name}\",\"status\":\"ok\",\"log_path\":\".ci-artifacts/${name}.log\"}" >> .ci-artifacts/guard-status.jsonl
            else
              echo "- status: failed (${status})" | tee -a "$GITHUB_STEP_SUMMARY"
              failures=1
              echo "{\"name\":\"${name}\",\"status\":\"failed\",\"log_path\":\".ci-artifacts/${name}.log\"}" >> .ci-artifacts/guard-status.jsonl
            fi
            echo >> "$GITHUB_STEP_SUMMARY"
            return 0
          }

          run_step go_test go test ./...
          run_step check_docs_consistency go run ./cmd/babel-dev check-docs-consistency
          run_step check_requirement_assets go run ./cmd/babel-dev check-requirement-assets

          if [[ "${{ steps.compare.outputs.mode }}" == "merge-base" ]]; then
            run_step check_docs_sync_guard go run ./cmd/babel-dev check-docs-sync-guard --merge-base-with "${{ steps.compare.outputs.merge_base_with }}"
          else
            run_step check_docs_sync_guard go run ./cmd/babel-dev check-docs-sync-guard --base "${{ steps.compare.outputs.base }}" --head "${{ steps.compare.outputs.head }}"
          fi

          go run ./cmd/babel-dev render-guard-report --title "docs-sync-guard report" .ci-artifacts/guard-status.jsonl > .ci-artifacts/guard-report.md
          cat .ci-artifacts/guard-report.md >> "$GITHUB_STEP_SUMMARY"
          echo "report_path=.ci-artifacts/guard-report.md" >> "$GITHUB_OUTPUT"

          if [[ $failures -ne 0 ]]; then
            echo "overall_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "overall_status=success" >> "$GITHUB_OUTPUT"

      - name: Comment PR with guard report
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        env:
          GUARD_REPORT_PATH: ${{ steps.guard_suite.outputs.report_path }}
          GUARD_REPORT_STATUS: ${{ steps.guard_suite.outputs.overall_status }}
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- docs-sync-guard-report -->";
            const body = fs.readFileSync(process.env.GUARD_REPORT_PATH, "utf8");
            const status = process.env.GUARD_REPORT_STATUS || "unknown";
            const finalBody = `${marker}\nstatus: \`${status}\`\n\n${body}`;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && typeof comment.body === "string" && comment.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body: finalBody,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number,
                body: finalBody,
              });
            }

      - name: Upload guard artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docs-sync-guard-logs
          path: .ci-artifacts/
